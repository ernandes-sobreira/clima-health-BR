<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLIMAQ-H Lite — Health co-benefits of clean air</title>
<script src="lib/xlsx.full.min.js"></script>
<script src="lib/chart.umd.min.js"></script>
<style>
:root{
  --ink:#12313a;        /* deep teal ink */
  --ink-2:#1d4b58;
  --breath:#1fb6c9;     /* breath cyan */
  --breath-dk:#0e8ea0;
  --leaf:#2f9e6f;       /* lives gained */
  --coral:#e8613c;      /* lives lost */
  --amber:#e0a030;
  --paper:#f7f5f0;      /* sober off-white */
  --paper-2:#fffefb;
  --line:#dcd8cf;
  --line-2:#e9e6df;
  --muted:#6a7a80;
  --ok:#2f9e6f;
  --warn:#c8531f;
  --shadow:0 1px 2px rgba(18,49,58,.06),0 6px 24px rgba(18,49,58,.06);
  --shadow-lg:0 8px 40px rgba(18,49,58,.12);
  --radius:14px;
  --fdisplay:"Fraunces",Georgia,serif;
  --fbody:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --fmono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
}
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;450;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--fbody);
  background:var(--paper);
  color:var(--ink);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"cv02","cv03","cv04","cv11";
}
h1,h2,h3,h4{font-family:var(--fdisplay);font-weight:600;line-height:1.15;margin:0}
a{color:var(--breath-dk)}
button{font-family:inherit}
.wrap{max-width:1080px;margin:0 auto;padding:0 28px}

/* ===== Top bar ===== */
.topbar{position:sticky;top:0;z-index:40;background:rgba(247,245,240,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topbar .wrap{display:flex;align-items:center;gap:18px;height:64px}
.brand{display:flex;align-items:center;gap:11px;font-family:var(--fdisplay);font-weight:600;font-size:19px;letter-spacing:-.01em}
.brand .mark{width:30px;height:30px;flex:none}
.brand small{font-family:var(--fbody);font-weight:500;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:block;line-height:1;margin-top:2px}
.topbar .spacer{flex:1}
.pill{font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:100px;padding:5px 12px;background:var(--paper-2)}
.ghost-btn{background:none;border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;transition:.15s}
.ghost-btn:hover{border-color:var(--breath);color:var(--breath-dk)}

/* ===== Hero ===== */
.hero{padding:60px 0 34px;border-bottom:1px solid var(--line)}
.hero .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--breath-dk);font-weight:600;margin-bottom:18px}
.hero h1{font-size:clamp(34px,5vw,54px);letter-spacing:-.02em;max-width:16ch}
.hero h1 em{font-style:italic;color:var(--breath-dk)}
.hero p.lead{font-size:18px;color:var(--ink-2);max-width:60ch;margin:20px 0 0}
.hero-actions{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap}
.cta{background:var(--ink);color:#fff;border:none;border-radius:11px;padding:14px 24px;font-size:15px;font-weight:600;cursor:pointer;transition:.18s;box-shadow:var(--shadow)}
.cta:hover{background:var(--breath-dk);transform:translateY(-1px)}
.cta.secondary{background:var(--paper-2);color:var(--ink);border:1px solid var(--line)}
.cta.secondary:hover{border-color:var(--breath);background:#fff}
.hero-meta{display:flex;gap:28px;margin-top:38px;flex-wrap:wrap}
.hero-meta div{font-size:13px;color:var(--muted)}
.hero-meta b{display:block;font-family:var(--fdisplay);font-size:22px;color:var(--ink);font-weight:600}

/* breathing signature line */
.breathline{height:2px;background:linear-gradient(90deg,transparent,var(--breath),transparent);margin-top:34px;opacity:.5;animation:breathe 5.5s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.25;transform:scaleX(.7)}50%{opacity:.65;transform:scaleX(1)}}

/* ===== Stepper ===== */
.stepper{position:sticky;top:64px;z-index:30;background:var(--paper);border-bottom:1px solid var(--line);padding:0}
.stepper .wrap{display:flex;gap:2px;overflow-x:auto;padding:0 28px}
.step-tab{flex:none;display:flex;align-items:center;gap:9px;padding:15px 16px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:13.5px;font-weight:500;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s}
.step-tab .n{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;font-size:12px;font-weight:600;font-family:var(--fmono);flex:none}
.step-tab.active{color:var(--ink);border-bottom-color:var(--breath)}
.step-tab.active .n{border-color:var(--breath);background:var(--breath);color:#fff}
.step-tab.done .n{border-color:var(--leaf);background:var(--leaf);color:#fff}
.step-tab.done{color:var(--ink-2)}
.step-tab:disabled{opacity:.45;cursor:not-allowed}

/* ===== Panels ===== */
.panel{display:none;padding:40px 0 80px}
.panel.active{display:block;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.panel-head{margin-bottom:26px}
.panel-head .kicker{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--breath-dk);font-weight:600;margin-bottom:8px}
.panel-head h2{font-size:29px;letter-spacing:-.015em}
.panel-head p{color:var(--ink-2);max-width:66ch;margin:12px 0 0;font-size:15.5px}

/* why-box */
.why{background:linear-gradient(180deg,#eefafb,#f4f8f6);border:1px solid #cdeaee;border-left:3px solid var(--breath);border-radius:12px;padding:16px 18px;margin:18px 0;font-size:14px;color:var(--ink-2)}
.why b{color:var(--ink);font-weight:600}
.why .tag{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--breath-dk);margin-bottom:5px}

.card{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:18px}
.card h3{font-size:19px;margin-bottom:6px}
.card .sub{color:var(--muted);font-size:14px;margin-bottom:18px}

/* form grid */
.grid{display:grid;gap:16px}
.grid.two{grid-template-columns:1fr 1fr}
.grid.three{grid-template-columns:1fr 1fr 1fr}
label.fld{display:block}
label.fld .lbl{font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:6px;display:flex;align-items:center;gap:6px}
label.fld .hint{font-weight:400;color:var(--muted);font-size:12px}
input[type=number],input[type=text],select{
  width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-size:15px;font-family:var(--fbody);
  background:#fff;color:var(--ink);transition:.15s;font-variant-numeric:tabular-nums}
input:focus,select:focus{outline:none;border-color:var(--breath);box-shadow:0 0 0 3px rgba(31,182,201,.14)}
input.bad{border-color:var(--coral);box-shadow:0 0 0 3px rgba(232,97,60,.12)}
.unit{font-family:var(--fmono);font-size:12px;color:var(--muted)}

.seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff}
.seg button{border:none;background:none;padding:10px 16px;font-size:13.5px;font-weight:500;cursor:pointer;color:var(--muted);transition:.15s}
.seg button.on{background:var(--ink);color:#fff}

.nav-row{display:flex;justify-content:space-between;gap:12px;margin-top:26px}

/* upload */
.drop{border:2px dashed var(--line);border-radius:var(--radius);padding:44px 24px;text-align:center;background:var(--paper-2);transition:.18s;cursor:pointer}
.drop.hot{border-color:var(--breath);background:#eefafb}
.drop svg{width:44px;height:44px;color:var(--breath-dk);margin-bottom:12px}
.drop b{font-size:16px}
.drop p{color:var(--muted);font-size:14px;margin:6px 0 0}

/* mapping table */
.map-table{width:100%;border-collapse:collapse;font-size:14px}
.map-table th{text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line)}
.map-table td{padding:9px 12px;border-bottom:1px solid var(--line-2);vertical-align:middle}
.map-table select{padding:8px 10px;font-size:13.5px}
.req-dot{width:7px;height:7px;border-radius:50%;background:var(--coral);display:inline-block;margin-right:7px}
.opt-dot{width:7px;height:7px;border-radius:50%;background:var(--line);display:inline-block;margin-right:7px}
.val-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px}
.val-ok{background:#e4f5ec;color:var(--leaf)}
.val-err{background:#fce8e2;color:var(--warn)}
.val-wait{background:#eef0ee;color:var(--muted)}

/* validation list */
.vlist{list-style:none;padding:0;margin:14px 0 0}
.vlist li{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line-2);font-size:14px}
.vlist .ic{flex:none;width:18px;height:18px;margin-top:2px}
.vlist .ic.ok{color:var(--leaf)}.vlist .ic.err{color:var(--coral)}.vlist .ic.warnc{color:var(--amber)}

/* ===== Results ===== */
.headline-grid{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:16px;margin-bottom:24px}
.stat{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat .lab{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
.stat .big{font-family:var(--fdisplay);font-size:clamp(38px,6vw,58px);font-weight:600;letter-spacing:-.02em;line-height:1;margin:12px 0 6px;font-variant-numeric:tabular-nums}
.stat .ci{font-size:13px;color:var(--muted);font-family:var(--fmono)}
.stat.hero-stat{grid-column:1/2}
.stat.hero-stat .big{color:var(--leaf)}
.stat.hero-stat::after{content:"";position:absolute;right:-30px;bottom:-30px;width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,rgba(47,158,111,.14),transparent 70%)}
.stat .big.coral{color:var(--coral)}
.stat .big.breath{color:var(--breath-dk)}
.stat .foot{font-size:12.5px;color:var(--ink-2);margin-top:10px;border-top:1px solid var(--line-2);padding-top:10px}

.chart-card{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);padding:22px 22px 16px;box-shadow:var(--shadow);margin-bottom:18px}
.chart-card .ch-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;gap:12px}
.chart-card h3{font-size:17px}
.chart-card .ch-sub{font-size:13px;color:var(--muted);margin:2px 0 14px;max-width:64ch}
.chart-wrap{position:relative;width:100%}
.dl-btn{background:none;border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--ink-2);white-space:nowrap;transition:.15s}
.dl-btn:hover{border-color:var(--breath);color:var(--breath-dk)}

.calc-box{background:#0f2a32;color:#cfe8ec;border-radius:12px;padding:18px 20px;font-family:var(--fmono);font-size:13px;line-height:1.7;overflow-x:auto;margin:14px 0}
.calc-box .cm{color:#6fbecb}
.calc-box .cn{color:#f0c674}
.calc-box .cr{color:#7fd8a0}
.calc-box .step-lbl{color:#8aa;font-size:11px;text-transform:uppercase;letter-spacing:.08em;display:block;margin:12px 0 3px}
.calc-box .step-lbl:first-child{margin-top:0}

.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:11px 12px;border-bottom:1.5px solid var(--line)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--line-2);font-variant-numeric:tabular-nums}
.tbl td.num{text-align:right;font-family:var(--fmono)}
.tbl tr:hover td{background:#faf9f6}
.tbl tfoot td{font-weight:600;border-top:1.5px solid var(--line);border-bottom:none;background:#f4f8f6}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty svg{width:52px;height:52px;color:var(--line);margin-bottom:14px}

.foot-note{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
footer{border-top:1px solid var(--line);padding:34px 0;color:var(--muted);font-size:13px;margin-top:40px}
footer .wrap{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:13px 22px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.3s;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:820px){
  .grid.two,.grid.three{grid-template-columns:1fr}
  .headline-grid{grid-template-columns:1fr}
  .stat.hero-stat{grid-column:auto}
  .hero{padding:40px 0 28px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script src="crf_data.js"></script>
<script src="app.js"></script>
</body>
</html>
